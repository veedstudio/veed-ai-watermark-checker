name: Merge Gatekeeper

on:
  pull_request:
    branches:
      - main

concurrency:
  group: merge-gatekeeper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge-gatekeeper:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      checks: read
      statuses: read
    steps:
      - name: Run Merge Gatekeeper
        uses: veedstudio/actions/merge-gatekeeper@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          interval: 10
          timeout: 3600
